name: hitster_poc
description: "Flutster — scan a music card, play the song on your own Spotify, guess the year. Fast-forward and start-30s-in controls."
publish_to: 'none'
version: 1.3.1+7

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # Spotify App Remote + auth (needs the Spotify app installed + Premium for playback control)
  spotify_sdk: ^3.0.2
  # QR / barcode scanning (7.x pulls 16 KB-aligned ML Kit + CameraX native libs)
  mobile_scanner: ^7.2.0
  # tiny helpers
  cupertino_icons: ^1.0.6
  # persist settings
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.2
  # preview-mode playback (30s iTunes clips; Java MediaPlayer under the hood,
  # no bundled native libs, so no 16 KB page-size concerns)
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 23
  adaptive_icon_background: "#F7F2E9"
  adaptive_icon_foreground: "assets/icon/foreground.png"
  adaptive_icon_monochrome: "assets/icon/monochrome.png"

flutter:
  uses-material-design: true
