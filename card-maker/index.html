<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flutster Card Maker</title>
    <meta name="description" content="Turn a Spotify playlist into printable double-sided Flutster cards — QR fronts, year · artist · title backs. Free, in your browser." />
    <meta name="theme-color" content="#f7f2e9" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#15171e" media="(prefers-color-scheme: dark)" />
    <script>
      // Apply the saved theme before first paint to avoid a flash.
      try {
        var t = localStorage.getItem('flutster_theme');
        if (t) document.documentElement.dataset.theme = t;
      } catch (e) {}
    </script>

    <!-- Favicons -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Social preview -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Flutster Card Maker" />
    <meta property="og:description" content="Turn a Spotify playlist into printable double-sided music-timeline cards." />
    <meta property="og:image" content="https://nicsilver.github.io/flutster/og-image.png" />
    <meta property="og:url" content="https://nicsilver.github.io/flutster/" />
    <meta name="twitter:card" content="summary_large_image" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
