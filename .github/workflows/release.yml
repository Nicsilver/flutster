name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/android/upload-keystore.jks

      - name: Write signing config
        run: |
          cat > app/android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=../upload-keystore.jks
          EOF

      - name: Build release APK
        working-directory: app
        run: flutter build apk --release

      - name: Name the artifact
        run: cp app/build/app/outputs/flutter-apk/app-release.apk flutster-${{ github.ref_name }}.apk

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: flutster-${{ github.ref_name }}.apk
          generate_release_notes: true
